volumes:
  ite-postgres-db-vol:
  ite-keycloak-vol:
networks:
  ite-net:
    external: true

services:
  ite-postgres-db:
    image: postgres:16.4
    container_name: ite-postgres-db
    ports:
      - "9168:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - ite-postgres-db-vol:/var/lib/postgresql/data
      - ./00_init_db.sql:/docker-entrypoint-initdb.d/00_init_db.sql
    networks:
      - ite-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ite-keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: ite-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://ite-postgres-db:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_PROXY: edge
      KC_HTTP_ENABLED: true
      JAVA_OPTS_APPEND: "-Xms512m -Xmx2048m"
    command: start
    ports:
      - "127.0.0.1:9999:8080"
    volumes:
      - ite-keycloak-vol:/opt/keycloak/data
    networks:
      - ite-net
    depends_on:
      ite-postgres-db:
        condition: service_healthy
    restart: unless-stopped