#spring.application.name=ecommerce-ite-app

file:
  client-path: file
  storage-location: E:\file\
  base-uri: http//localhost:9090:${server.port}{file.clent-path}

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  application:
    name: ecommerce-ite-app

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 9090

